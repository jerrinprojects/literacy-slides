<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spelling Lists 18–33</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Segoe UI',Arial,sans-serif;}
body{background:#f4f0fc;}

/* ── MAIN PAGE ── */
#main{
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;padding:52px 24px 80px;
}
#main h1{font-size:3rem;color:#3b0764;margin-bottom:8px;text-align:center;font-weight:800;}
#main .sub{font-size:1.2rem;color:#7c3aed;margin-bottom:48px;}
.grid{display:flex;flex-wrap:wrap;gap:22px;justify-content:center;max-width:960px;}

.card{
  background:#fff;border-radius:22px;padding:32px 26px;width:210px;
  text-align:center;cursor:pointer;
  box-shadow:0 6px 26px rgba(100,50,200,.12);
  transition:transform .18s,box-shadow .18s;
  border:3px solid transparent;
}
.card:hover{
  transform:translateY(-8px);
  box-shadow:0 16px 40px rgba(100,50,200,.22);
  border-color:var(--c);
}
.card .badge{
  display:inline-block;color:#fff;font-size:.82rem;font-weight:700;
  padding:5px 16px;border-radius:20px;background:var(--c);
  margin-bottom:14px;letter-spacing:.05em;
}
.card h2{font-size:1.05rem;color:#1e1e2e;line-height:1.45;margin-bottom:6px;font-weight:700;}
.card p{font-size:.85rem;color:#888;line-height:1.4;}
.card .arr{font-size:1.6rem;margin-top:12px;display:block;transition:transform .18s;color:var(--c);}
.card:hover .arr{transform:translateX(6px);}

/* ── SLIDE VIEW ── */
#sv{display:none;position:fixed;inset:0;background:#fff;flex-direction:column;}

/* top bar */
.topbar{
  display:flex;align-items:center;padding:14px 22px;gap:14px;
  border-bottom:2px solid #e5e7eb;background:#fff;flex-shrink:0;
}
.btn-back{
  background:#f3f4f6;color:#374151;border:none;border-radius:10px;
  padding:9px 20px;font-size:1rem;cursor:pointer;font-weight:600;
  transition:background .15s;
}
.btn-back:hover{background:#e5e7eb;}
.btn-sidebar{
  background:#f3f4f6;color:#374151;border:none;border-radius:10px;
  padding:9px 13px;font-size:1.1rem;cursor:pointer;font-weight:700;
  transition:background .15s;flex-shrink:0;
}
.btn-sidebar:hover{background:#e5e7eb;}
.topbar-title{
  flex:1;text-align:center;color:#374151;font-size:1rem;font-weight:700;
  letter-spacing:.02em;
}
.topbar-count{color:#9ca3af;font-size:.9rem;min-width:64px;text-align:right;font-weight:600;}

/* body = sidebar + main */
#sv-body{flex:1;display:flex;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{
  width:0;flex-shrink:0;overflow:hidden;
  background:#f9fafb;border-right:2px solid #e5e7eb;
  transition:width .25s ease;
  display:flex;flex-direction:column;
}
.sidebar.open{width:240px;}
.sb-list{overflow-y:auto;flex:1;}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;cursor:pointer;
  border-bottom:1px solid #f0f0f0;
  transition:background .12s;
  font-size:.84rem;color:#374151;line-height:1.3;
  white-space:nowrap;overflow:hidden;
}
.sb-item:hover{background:#f0f0f0;}
.sb-item.on{background:var(--sb-accent-bg,#ede9fe);color:var(--sb-accent-fg,#5b21b6);font-weight:700;}
.sb-num{
  min-width:26px;height:26px;border-radius:50%;
  background:#e5e7eb;display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:700;flex-shrink:0;
}
.sb-item.on .sb-num{background:var(--sb-accent,#7c3aed);color:#fff;}
.sb-label{overflow:hidden;text-overflow:ellipsis;}
.sb-item.sb-sentence .sb-label{font-style:italic;color:#6b7280;}

/* sv-main = stage + nav */
#sv-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* stage — fills all remaining height */
.stage{
  flex:1;display:flex;align-items:stretch;justify-content:center;
  overflow:hidden;padding:0;
}

/* every slide fills the stage */
.slide-wrap{
  width:100%;display:flex;align-items:center;justify-content:center;
  padding:32px 40px;animation:pop .22s ease;
}
@keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}

/* ── TITLE SLIDE ── */
.sl-title{
  background:#fff;width:100%;max-width:860px;
  text-align:center;
}
.sl-title .list-num{
  font-size:1.1rem;font-weight:700;color:#fff;
  display:inline-block;padding:6px 22px;border-radius:30px;
  margin-bottom:24px;letter-spacing:.06em;
}
.sl-title h2{
  font-size:clamp(2.4rem,5vw,4rem);font-weight:800;
  color:#111827;margin-bottom:20px;line-height:1.15;
}
.sl-title .rule{
  font-size:clamp(1.2rem,2.2vw,1.6rem);color:#4b5563;
  line-height:1.65;max-width:680px;margin:0 auto;
}

/* ── SECTION SLIDE ── */
.sl-section{
  background:#fff;width:100%;max-width:860px;text-align:center;
}
.sl-section .sec-label{
  font-size:clamp(1rem,1.8vw,1.3rem);font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:18px;
}
.sl-section h3{
  font-size:clamp(2.2rem,5vw,4rem);font-weight:800;
  line-height:1.2;color:#111827;
}
.sl-section .sec-sub{
  font-size:clamp(1.1rem,2vw,1.5rem);color:#6b7280;margin-top:18px;
}

/* ── WORD SLIDE ── */
.sl-word{
  background:#fff;width:100%;max-width:960px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
}
.sl-word .list-tag{
  font-size:1rem;font-weight:700;color:#fff;
  padding:5px 18px;border-radius:20px;margin-bottom:28px;letter-spacing:.05em;
}
.sl-word .the-word{
  font-weight:800;line-height:1.05;color:#111827;
  /* font-size set by JS */
}
.sl-word .hl{font-weight:900;}   /* color set by JS */
.sl-word .sub-text{
  font-size:clamp(1.2rem,2.5vw,1.8rem);color:#6b7280;
  margin-top:22px;font-weight:500;
}
.sl-word .parts{
  margin-top:18px;font-size:clamp(1.1rem,2.2vw,1.6rem);color:#9ca3af;
  font-weight:600;
}
.sl-word .parts .p1{font-weight:700;}
.sl-word .parts .p2{font-weight:700;}

/* ── NAV ── */
.nav{
  display:flex;align-items:center;justify-content:center;gap:20px;
  padding:14px 22px;border-top:2px solid #e5e7eb;
  background:#fff;flex-shrink:0;
}
.btn-nav{
  background:#f3f4f6;color:#374151;border:2px solid #e5e7eb;
  border-radius:12px;padding:12px 30px;font-size:1.05rem;
  cursor:pointer;font-weight:700;transition:background .15s,border-color .15s;
  min-width:110px;
}
.btn-nav:hover:not(:disabled){background:#e5e7eb;border-color:#d1d5db;}
.btn-nav:disabled{opacity:.3;cursor:default;}
/* ── SENTENCE SLIDE ── */
.sl-sentence{
  background:#fff;width:100%;max-width:820px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
}
.sl-sentence .list-tag{
  font-size:1rem;font-weight:700;color:#fff;
  padding:5px 18px;border-radius:20px;margin-bottom:20px;letter-spacing:.05em;
}
.sl-sentence .sent-label{
  font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:#9ca3af;margin-bottom:12px;
}
.sl-sentence .the-sentence{
  font-size:clamp(1.4rem,3.2vw,2.2rem);font-weight:700;
  color:#111827;line-height:1.55;max-width:700px;
}

/* ── SIDEBAR MOBILE BACKDROP ── */
#sb-backdrop{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:30;
}
#sb-backdrop.visible{display:block;}

@media(max-width:700px){
  /* Sidebar becomes a fixed overlay on mobile */
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;z-index:40;
    width:0;
  }
  .sidebar.open{width:280px;}
}
@media(max-width:540px){
  .slide-wrap{padding:20px 16px;}
  .btn-nav{padding:10px 18px;font-size:.95rem;min-width:80px;}
  .topbar-title{font-size:.85rem;}
}

/* ── CARD WITH TWO BUTTONS ── */
.card-btns{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
.card-btn{
  display:block;width:100%;text-align:center;padding:9px 16px;border-radius:12px;
  font-size:.9rem;font-weight:700;cursor:pointer;transition:all .15s;
  border:2px solid var(--c);color:var(--c);background:#fff;
  text-decoration:none;
}
.card-btn:hover{background:var(--c);color:#fff;}
.card-btn-act{background:var(--c);color:#fff;}
.card-btn-act:hover{opacity:.85;}

/* ── ACTIVITY PAGE ── */
#act{display:none;position:fixed;inset:0;background:#f0fdf4;overflow-y:auto;}
.act-topbar{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;padding:14px 22px;gap:14px;
  border-bottom:2px solid #bbf7d0;background:#fff;flex-shrink:0;
}
.act-content{max-width:820px;margin:0 auto;padding:32px 24px 60px;}
.act-page{margin-bottom:56px;}
.act-page h2{
  font-size:1rem;font-weight:800;color:#15803d;
  border-bottom:3px solid #86efac;padding-bottom:7px;margin-bottom:16px;
  letter-spacing:.04em;text-transform:uppercase;
}
.act-title{
  background:#15803d;color:#fff;border-radius:14px;
  padding:18px 24px;margin-bottom:24px;text-align:center;
}
.act-title h1{font-size:1.5rem;font-weight:800;margin-bottom:3px;}
.act-title p{font-size:.9rem;opacity:.8;}
.act-name-line{display:flex;gap:32px;margin-bottom:20px;font-size:.9rem;font-weight:600;color:#374151;}
.act-name-line span{border-bottom:2px solid #374151;flex:1;min-height:26px;display:inline-block;margin-left:6px;}

/* word bank */
.act-bank{
  display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;padding:10px 14px;
  background:#fff;border:2px solid #86efac;border-radius:10px;
}
.act-bank span{font-size:.87rem;font-weight:600;color:#15803d;background:#f0fdf4;border:1px solid #86efac;padding:3px 10px;border-radius:7px;}

/* cloze */
.cloze-list{list-style:none;display:flex;flex-direction:column;gap:13px;}
.cloze-list li{display:flex;align-items:baseline;gap:6px;font-size:.97rem;line-height:1.6;}
.cloze-num{color:#15803d;font-weight:700;width:20px;flex-shrink:0;}
.cloze-blank{border-bottom:2px solid #374151;display:inline-block;width:110px;margin:0 4px;vertical-align:bottom;}

/* scramble */
.scramble-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 36px;}
.sc-row{display:flex;align-items:center;gap:8px;font-size:.92rem;padding:4px 0;}
.sc-num{color:#15803d;font-weight:700;width:20px;flex-shrink:0;}
.sc-word{font-family:monospace;font-size:.95rem;font-weight:700;color:#374151;letter-spacing:.1em;min-width:90px;}
.sc-ans{border-bottom:2px solid #374151;flex:1;min-height:22px;}

/* match */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;}
.match-col-head{font-size:.8rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.match-row{display:flex;align-items:center;gap:8px;font-size:.92rem;padding:5px 0;border-bottom:1px solid #e5e7eb;}
.match-num{color:#15803d;font-weight:700;width:20px;flex-shrink:0;}
.match-ans{border-bottom:2px solid #374151;flex:1;min-height:22px;margin-left:4px;}

/* word sort */
.sort-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;}
.sort-col{border:2px solid #86efac;border-radius:10px;overflow:hidden;}
.sort-head{background:#15803d;color:#fff;text-align:center;font-weight:800;font-size:.9rem;padding:7px;letter-spacing:.04em;}
.sort-body{padding:8px 10px;display:flex;flex-direction:column;gap:5px;}
.sort-line{border-bottom:1px solid #d1d5db;height:24px;}

/* build a sentence */
.sent-grid{display:flex;flex-direction:column;gap:18px;}
.sent-item .sent-word{font-weight:800;color:#15803d;font-size:.95rem;margin-bottom:6px;}
.sent-line{border-bottom:2px solid #374151;height:28px;}

/* answers toggle */
.ans{display:none;color:#15803d;font-weight:700;font-size:.88rem;margin-left:4px;}
.ans-words{display:none;flex-direction:column;gap:4px;}
.ans-words .ans-word{font-size:.85rem;font-weight:700;color:#15803d;padding:2px 0;}
.sort-lines{display:flex;flex-direction:column;gap:5px;}
#act.show-ans .ans{display:inline;}
#act.show-ans .ans-words{display:flex;}
#act.show-ans .sort-lines{display:none;}

/* cloze options */
.cloze-opts{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;}
.cloze-opt{
  font-size:.85rem;font-weight:600;padding:3px 11px;border-radius:8px;
  border:1.5px solid #d1d5db;color:#374151;background:#f9fafb;
}
#act.show-ans .cloze-opt.correct{background:#dcfce7;color:#15803d;border-color:#16a34a;font-weight:800;}

/* print */
@media print{
  #main,#sv,#sb-backdrop,.act-topbar{display:none!important;}
  #act{display:block!important;position:static!important;overflow:visible!important;background:#fff!important;}
  .act-content{padding:0;}
  .act-page{page-break-after:always;margin-bottom:0;}
  .act-page:last-child{page-break-after:avoid;}
  .act-bank,.sort-col,.match-row,.cloze-list li,.sc-row,.sent-item{break-inside:avoid;}
  @page{size:A4;margin:14mm 16mm;}
}
</style>
</head>
<body>

<!-- MAIN PAGE -->
<div id="main">
  <h1>Spelling Lists</h1>
  <p class="sub">Year 3 · Lists 18 – 33</p>
  <div class="grid" id="cards"></div>
</div>

<!-- Mobile sidebar backdrop -->
<div id="sb-backdrop" onclick="closeSidebarMobile()"></div>

<!-- SLIDE VIEW -->
<div id="sv">
  <div class="topbar">
    <button class="btn-sidebar" onclick="toggleSidebar()" title="Slides panel">☰</button>
    <button class="btn-back" onclick="closeSlides()">← Back</button>
    <div class="topbar-title" id="sv-title"></div>
    <div class="topbar-count" id="sv-count"></div>
  </div>
  <div id="sv-body">
    <div class="sidebar" id="sidebar">
      <div class="sb-list" id="sb-list"></div>
    </div>
    <div id="sv-main">
      <div class="stage" id="stage"></div>
      <div class="nav">
        <button class="btn-nav" id="bprev" onclick="go(-1)">Prev</button>
        <button class="btn-nav" id="bnext" onclick="go(1)">Next</button>
      </div>
    </div>
  </div>
</div>

<!-- ACTIVITY PAGE -->
<div id="act">
  <div class="act-topbar">
    <button class="btn-back" onclick="closeActivity()">← Back</button>
    <div class="topbar-title" style="color:#15803d;font-weight:800;">List 24 · Compound Words 2 — Activities</div>
    <button id="btn-ans" class="btn-back" onclick="toggleAnswers()" style="margin-left:auto;">Show Answers</button>
    <button class="btn-back" onclick="window.print()">🖨 Print</button>
  </div>
  <div class="act-content" id="act-content"></div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════════════
// slide items:
//   "word"                     → plain word slide
//   {s:"text"}                 → section divider
//   {w:"word", sub:"origin"}   → word + small subtitle (contractions)
//   {w:"word", p:["a","b"]}    → compound word with visible join
//   {w:"word", syl:"a·b"}      → word with syllable split shown

const LISTS = [
{
  num:0, badge:"Heart Words",
  title:"Year 3 High-Frequency Words",
  rule:"Heart words are common words that appear often in reading and writing.\nLearn to read and spell these words by heart.",
  accent:"#db2777", hlColor:"#be185d", hl:null,
  slides:[
    "any","also","ask","ever","many","very",
    "any","help","their","through","bought","really",
    "hour","gone","never","always","house","eyes",
    "more","once","our","fast","last"
  ],
  sentences:[
    "She also asked for help many times.",
    "Their eyes went through the house very fast.",
    "We always go once more — never last."
  ]
},
{
  num:18, title:"R-Controlled Syllable",
  rule:"When 'r' follows a vowel, the 'r' controls the vowel sound.\n'ar' as in 'car'. 'or' as in 'for'.",
  accent:"#b45309", hlColor:"#92400e", hl:null,
  hlFn: w=>{
    if(/ar/.test(w)) return "ar";
    if(/or/.test(w)) return "or";
    return null;
  },
  slides:[
    {s:"'ar' words"},
    "harm","dark","car","start","arm","jar","bar","cart",
    "hard","sharp","spark","garden","smart",
    "chart","march","artist","arch","scar","yard","farm",
    {s:"'or' words"},
    "for","corn","born","fort","popcorn","storm",
    "forgot","north","core","pork","torch","horse",
    "morning","sport","more","shore","order"
  ],
  sentences:[
    "In the morning we drove to the farm.",
    "The horse ran north to the shore.",
    "A sharp spark lit the dark arch."
  ]
},
{
  num:19, title:"'y' as a Vowel",
  rule:"The letter 'y' acts as a vowel in two ways.\n'y' at the end of a short word = long /i/ sound (fly, sky).\n'y' at the end of a longer word = long /e/ sound (happy, funny).",
  accent:"#7c3aed", hlColor:"#6d28d9", hl:null,
  hlFn: w=>{
    if(w.endsWith("y")) return "y";
    return null;
  },
  slides:[
    {s:"'y' as long /i/ — short words"},
    "cry","shy","sky","dry","fry","my","fly","try","by","sly","spy","July","deny","rely","supply",
    {s:"'y' as long /e/ — longer words"},
    "happy","funny","silly","cheeky","puppy","tidy",
    "family","empty","party","sorry",
    "nobody","merry","windy","dusty","lucky",
    "bossy","muddy","stormy","army","baby"
  ],
  sentences:[
    "A funny puppy tried to fly a kite.",
    "The shy baby cried at the party.",
    "A silly puppy ran across the dry grass."
  ]
},
{
  num:20, title:"Vowel Teams 'ea' and 'ee' represent long /e/",
  rule:"The vowel teams 'ea' and 'ee' both make the long /e/ sound.\n'ea' as in 'eat'. 'ee' as in 'see'.",
  accent:"#16a34a", hlColor:"#15803d", hl:null,
  hlFn: w=>{
    if(w.includes("ea")) return "ea";
    if(w.includes("ee")) return "ee";
    return null;
  },
  slides:[
    {s:"'ea' makes long /e/ sound"},
    "eat","read","sea","bean","cream","dream","team","steam","beat","meat",
    "feast","beach","teach","reach","seat","treat","heal","deal","real","meal",
    "leaf","clean","mean","speak","beak",
    {s:"'ee' makes long /e/ sound"},
    "see","tree","free","bee","feed","seed","need","feet","meet","street",
    "green","keep","sleep","sheep","deep","feel","heel","week","seek","three",
    "agree","teeth","steel","wheel","sweet"
  ],
  sentences:[
    "We ate a sweet meal by the sea.",
    "The team sat under the big green tree.",
    "She loves to read and eat sweet treats."
  ]
},
{
  num:21, title:"Vowel Teams 'oa' and 'ow' represent long /o/",
  rule:"The vowel teams 'oa' and 'ow' both make the long /o/ sound.\n'oa' as in 'boat'. 'ow' as in 'show'.",
  accent:"#0d9488", hlColor:"#0f766e", hl:null,
  hlFn: w=>{
    if(w.includes("oa")) return "oa";
    if(w.includes("ow")) return "ow";
    return null;
  },
  slides:[
    {s:"'oa' makes long /o/ sound"},
    "boat","coat","goat","road","toad","load","soak","foam","roam","toast",
    "roast","coast","float","groan","loan","moan","oak","goal","coal","cloak",
    "throat","approach",
    {s:"'ow' makes long /o/ sound"},
    "show","blow","flow","grow","know","low","slow","snow","throw","crow",
    "glow","below","elbow","follow","shadow","window","yellow","hollow","rainbow","meadow"
  ],
  sentences:[
    "The yellow boat floated below the bridge.",
    "A crow sat by the window and watched.",
    "A slow wind began to blow."
  ]
},
{
  num:22, title:"Homophones 1",
  rule:"Homophones are words that sound the same but have different spellings and meanings.\nCheck the meaning to choose the correct spelling.",
  accent:"#dc2626", hlColor:"#b91c1c", hl:null,
  slides:[
    {s:"to / two / too"},
    {w:"to",sub:"direction — go to school"},
    {w:"two",sub:"the number 2"},
    {w:"too",sub:"also / very — me too"},
    {s:"there / their / they're"},
    {w:"there",sub:"a place — over there"},
    {w:"their",sub:"belonging to them"},
    {w:"they're",sub:"they are — they're happy"},
    {s:"more homophones"},
    {w:"here",sub:"this place"},{w:"hear",sub:"with your ears"},
    {w:"where",sub:"which place"},{w:"wear",sub:"put on clothes"},
    {w:"write",sub:"with a pencil"},{w:"right",sub:"correct / direction"},
    {w:"know",sub:"in your mind"},{w:"no",sub:"not yes"},
    {w:"see",sub:"with your eyes"},{w:"sea",sub:"ocean water"},
    {w:"by",sub:"next to / written by"},{w:"buy",sub:"to purchase"},
    {w:"sun",sub:"shines in the sky"},{w:"son",sub:"male child"},

function buildMain(){
  const g = document.getElementById("cards");
  LISTS.forEach((L,i)=>{
    const d = document.createElement("div");
    d.className = "card";
    d.style.setProperty("--c", L.accent);
    if(L.activity){
      d.innerHTML = `
        <div class="badge">${L.badge || 'List ' + L.num}</div>
        <h2>${L.title}</h2>
        <p style="color:${L.accent};font-weight:700;font-size:.9rem;margin-top:4px;">${countWords(L)} words</p>
        <div class="card-btns">
          <button class="card-btn" style="--c:${L.accent}" onclick="event.stopPropagation();openList(${i})">Slides →</button>
          <button class="card-btn card-btn-act" style="--c:${L.accent}" onclick="event.stopPropagation();openActivity()">Activities ✎</button>
        </div>`;
    } else if(L.worksheet){
      d.innerHTML = `
        <div class="badge">${L.badge || 'List ' + L.num}</div>
        <h2>${L.title}</h2>
        <p style="color:${L.accent};font-weight:700;font-size:.9rem;margin-top:4px;">${countWords(L)} words</p>
        <div class="card-btns">
          <button class="card-btn" style="--c:${L.accent}" onclick="event.stopPropagation();openList(${i})">Slides →</button>
          <a class="card-btn card-btn-act" style="--c:${L.accent}" href="${L.worksheet}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Worksheet ✎</a>
        </div>`;
    } else {
      d.innerHTML = `
        <div class="badge">${L.badge || 'List ' + L.num}</div>
        <h2>${L.title}</h2>
        <p style="color:${L.accent};font-weight:700;font-size:.9rem;margin-top:4px;">${countWords(L)} words</p>
        <span class="arr">→</span>`;
      d.onclick = ()=> openList(i);
    }
    g.appendChild(d);
  });
}

function countWords(L){
  return L.slides.filter(s=>typeof s==="string"||s.w).length;
}

// ══════════════════════════════════════════════════════
//  SLIDE BUILD
// ══════════════════════════════════════════════════════
let curList=null, curIdx=0, slides=[];

function buildSlides(L){
  const {accent:acc, hlColor, hl, hlFn} = L;

  function getHl(word){
    if(hlFn) return hlFn(word);
    return hl||null;
  }

  function applyHl(text, pattern){
    if(!pattern) return text;
    const re = new RegExp(pattern.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g");
    return text.replace(re,`<span class="hl" style="color:${hlColor}">${pattern}</span>`);
  }

  function fs(word){
    const n = word.replace(/[·]/g,"").length;
    if(n<=3)  return "clamp(5rem,18vw,11rem)";
    if(n<=5)  return "clamp(4rem,14vw,9rem)";
    if(n<=7)  return "clamp(3.2rem,11vw,7.5rem)";
    if(n<=9)  return "clamp(2.8rem,9vw,6rem)";
    if(n<=12) return "clamp(2.2rem,7vw,5rem)";
    return              "clamp(1.8rem,5.5vw,4rem)";
  }

  const out=[];

  // ── title slide
  out.push({html:`
    <div class="slide-wrap">
      <div class="sl-title">
        <div class="list-num" style="background:${acc}">${L.badge || 'List ' + L.num}</div>
        <h2>${L.title}</h2>
        <p class="rule">${L.rule.replace(/\n/g,"<br>")}</p>
      </div>
    </div>`});

  L.slides.forEach(item=>{
    if(typeof item==="string"){
      const pattern = getHl(item);
      const display = applyHl(item, pattern);
      out.push({word:item, html:`
        <div class="slide-wrap">
          <div class="sl-word">
            <div class="list-tag" style="background:${acc}">${L.badge || 'List ' + L.num + ' · ' + L.title}</div>
            <p class="the-word" style="font-size:${fs(item)}">${display}</p>
          </div>
        </div>`});
    } else if(item.s){
      out.push({html:`
        <div class="slide-wrap">
          <div class="sl-section">
            <div class="sec-label" style="color:${acc}">${L.badge || 'List ' + L.num + ' · ' + L.title}</div>
            <h3 style="color:${acc}">${item.s}</h3>
          </div>
        </div>`});
    } else if(item.w){
      const word = item.w;
      const display_raw = item.syl || word;
      const pattern = getHl(word);
      const display = applyHl(display_raw, pattern);
      const subHtml = item.sub
        ? `<div class="sub-text">${item.sub}</div>`
        : item.syl
        ? `<div class="sub-text" style="color:${acc};font-weight:600;font-size:clamp(1rem,2vw,1.4rem);">trum · pet  (syllable split)</div>`
        : "";
      const partsHtml = item.p
        ? `<div class="parts"><span class="p1" style="color:${acc}">${item.p[0]}</span>&nbsp;+&nbsp;<span class="p2" style="color:${hlColor}">${item.p[1]}</span></div>`
        : "";
      out.push({word, html:`
        <div class="slide-wrap">
          <div class="sl-word">
            <div class="list-tag" style="background:${acc}">${L.badge || 'List ' + L.num + ' · ' + L.title}</div>
            <p class="the-word" style="font-size:${fs(word)}">${display}</p>
            ${subHtml}${partsHtml}
          </div>
        </div>`});
    }
  });

  // ── sentence slides
  if(L.sentences){
    L.sentences.forEach((sent,i)=>{
      out.push({sentence:true, label:`Sentence ${i+1}`, html:`
        <div class="slide-wrap">
          <div class="sl-sentence">
            <div class="list-tag" style="background:${acc}">${L.badge || 'List ' + L.num + ' · ' + L.title}</div>
            <div class="sent-label">Sentence ${i+1} of ${L.sentences.length}</div>
            <p class="the-sentence">${sent}</p>
          </div>
        </div>`});
    });
  }

  return out;
}

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
  if(window.innerWidth<=700){
    const isOpen = document.getElementById("sidebar").classList.contains("open");
    document.getElementById("sb-backdrop").classList.toggle("visible", isOpen);
  }
}

function closeSidebarMobile(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sb-backdrop").classList.remove("visible");
}

function buildSidebar(){
  const sb   = document.getElementById("sidebar");
  const list = document.getElementById("sb-list");
  // set accent colours as CSS vars
  sb.style.setProperty("--sb-accent", curList.accent);
  // light tint for active bg
  sb.style.setProperty("--sb-accent-bg", curList.accent + "22");
  sb.style.setProperty("--sb-accent-fg", curList.accent);

  list.innerHTML = slides.map((s,i)=>{
    let label;
    if(i===0) label = "Title";
    else if(s.sentence) label = s.label;
    else if(s.word) label = s.word;
    else{
      // section slide — extract h3 text
      const m = s.html.match(/<h3[^>]*>([\s\S]*?)<\/h3>/);
      label = m ? m[1].replace(/<[^>]+>/g,"").trim() : "—";
    }
    const sentCls = s.sentence ? " sb-sentence" : "";
    return `<div class="sb-item${i===curIdx?" on":""}${sentCls}" onclick="goTo(${i})">
      <div class="sb-num">${i+1}</div>
      <div class="sb-label">${label}</div>
    </div>`;
  }).join("");
}

function updateSidebar(){
  document.querySelectorAll(".sb-item").forEach((el,i)=>{
    el.classList.toggle("on", i===curIdx);
  });
  // scroll active item into view
  const active = document.querySelector(".sb-item.on");
  if(active) active.scrollIntoView({block:"nearest",behavior:"smooth"});
}

// ══════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════
function openList(idx){
  curList = LISTS[idx];
  curIdx  = 0;
  slides  = buildSlides(curList);

  document.getElementById("sv-title").textContent = curList.badge ? `${curList.badge} · ${curList.title}` : `List ${curList.num} · ${curList.title}`;


  buildSidebar();
  render();

  document.getElementById("main").style.display = "none";
  document.getElementById("sv").style.display   = "flex";
  // desktop: open sidebar by default; mobile: start closed
  if(window.innerWidth > 700){
    document.getElementById("sidebar").classList.add("open");
  } else {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("sb-backdrop").classList.remove("visible");
  }
}

function render(){
  document.getElementById("stage").innerHTML = slides[curIdx].html;
  document.getElementById("sv-count").textContent = `${curIdx+1} / ${slides.length}`;
  document.getElementById("bprev").disabled = curIdx===0;
  document.getElementById("bnext").disabled = curIdx===slides.length-1;
  // color nav buttons
  const nb = document.querySelectorAll(".btn-nav:not(:disabled)");
  nb.forEach(b=>{ b.style.borderColor=curList.accent; b.style.color=curList.accent; });
  updateSidebar();
}

function go(dir){
  const n=curIdx+dir;
  if(n<0||n>=slides.length) return;
  curIdx=n; render();
}
function goTo(i){ curIdx=i; render(); }

function closeSlides(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sv").style.display   = "none";
  document.getElementById("main").style.display = "flex";
}

document.addEventListener("keydown",e=>{
  if(document.getElementById("sv").style.display==="flex"){
    if(e.key==="ArrowRight"||e.key==="ArrowDown") go(1);
    if(e.key==="ArrowLeft" ||e.key==="ArrowUp")   go(-1);
    if(e.key==="Escape") closeSlides();
  }
});

// ══════════════════════════════════════════════════════
//  LIST 24 ACTIVITY PAGE
// ══════════════════════════════════════════════════════
function openActivity(){
  if(!document.getElementById("act-content").innerHTML) buildActivityPage();
  document.getElementById("main").style.display = "none";
  document.getElementById("act").style.display  = "block";
}
function closeActivity(){
  document.getElementById("act").classList.remove("show-ans");
  const btn = document.getElementById("btn-ans");
  btn.textContent = "Show Answers"; btn.style.background=""; btn.style.color="";
  document.getElementById("act").style.display  = "none";
  document.getElementById("main").style.display = "flex";
}
function toggleAnswers(){
  const act = document.getElementById("act");
  const btn = document.getElementById("btn-ans");
  const on = act.classList.toggle("show-ans");
  btn.textContent = on ? "Hide Answers" : "Show Answers";
  btn.style.background = on ? "#15803d" : "";
  btn.style.color = on ? "#fff" : "";
  btn.style.borderColor = on ? "#15803d" : "";
}

function buildActivityPage(){
  const acc = "#16a34a";

  // ─ Activity 1: Cloze with 3 options each ─
  // opts: [A, B, C] — correct one marked with correct:true
  const clozePairs = [
    {s:"The ___ jumped onto the rock.",             w:"starfish",   opts:["sunshine","starfish","birthday"],   ci:1},
    {s:"We played ___ after school.",               w:"football",   opts:["football","bedroom","playground"],  ci:0},
    {s:"A ___ landed on my arm.",                   w:"butterfly",  opts:["rainbow","sunflower","butterfly"],  ci:2},
    {s:"There was ___ to sit in the park.",         w:"nowhere",    opts:["nowhere","somewhere","anything"],   ci:0},
    {s:"She did not see ___ in the dark.",          w:"anything",   opts:["everything","anything","nothing"],  ci:1},
    {s:"It was my ___ and I got a cake.",           w:"birthday",   opts:["sunshine","bedroom","birthday"],    ci:2},
    {s:"The ___ flowed down the mountain.",         w:"waterfall",  opts:["waterfall","playground","sunflower"],ci:0},
    {s:"He looked ___ but could not find his cat.", w:"everywhere", opts:["somewhere","anywhere","everywhere"],ci:2},
    {s:"We picked a ___ from the garden.",          w:"sunflower",  opts:["sunshine","sunflower","rainbow"],   ci:1},
    {s:"The bright ___ lit up the sky.",            w:"sunshine",   opts:["sunshine","rainbow","starfish"],    ci:0},
  ];

  // ─ Activity 2: Scramble with letter-count hint ─
  const scramblePairs = [
    {sc:"ESNHINUS",   w:"sunshine"},
    {sc:"HTYIRDAB",   w:"birthday"},
    {sc:"OORDMBE",    w:"bedroom"},
    {sc:"LLBTAOFO",   w:"football"},
    {sc:"EUDISOT",    w:"outside"},
    {sc:"WINABOR",    w:"rainbow"},
    {sc:"SHRTIFAS",   w:"starfish"},
    {sc:"LLAFRETAW",  w:"waterfall"},
    {sc:"YFLTTREBU",  w:"butterfly"},
    {sc:"DUGRONYLAP", w:"playground"},
    {sc:"ROFLWNUSE",  w:"sunflower"},
    {sc:"MREADAYDE",  w:"daydream"},
  ];

  // ─ Activity 3: Match the Halves ─
  const matchA = ["sun","birth","bed","foot","out","rain","star","water","butter","play"];
  // second parts displayed in shuffled order as word bank
  const matchB = ["fly","day","room","ball","side","bow","fish","fall","ground","shine"];

  // ─ Activity 4: Word Sort ─
  const sortWords = ["nowhere","everything","someone","anytime","nothing","everybody",
    "somewhere","anyone","everywhere","something","sometimes","nobody","anything","everyone","anywhere"];
  const sortGroups = ["every–","some–","any–","no–"];

  // ─ Activity 5: Build a Sentence ─
  const sentWords = ["sunshine","birthday","playground","butterfly","waterfall","rainbow"];

  // ─── Helpers ───
  const nameBlock = `<div class="act-name-line">Name:&nbsp;<span></span>&nbsp;&nbsp;&nbsp;Date:&nbsp;<span style="max-width:130px"></span></div>`;
  const titleBlock = `<div class="act-title"><h1>Compound Words 2 · List 24</h1><p>Follow-up Activities</p></div>`;
  const bankOf = arr => `<div class="act-bank">${arr.map(w=>`<span>${w}</span>`).join("")}</div>`;

  // answer key for match halves
  const matchAnswers = ["sunshine","birthday","bedroom","football","outside","rainbow","starfish","waterfall","butterfly","playground"];
  // answer key for sort
  const sortAnswerMap = {
    "every–":["everything","everybody","everyone","everywhere"],
    "some–": ["something","sometimes","someone","somewhere"],
    "any–":  ["anything","anytime","anyone","anywhere"],
    "no–":   ["nothing","nobody","nowhere"],
  };
  // example sentences for act 5
  const sentExamples = {
    sunshine:   "The sunshine made the park feel warm.",
    birthday:   "We had a party for his birthday.",
    playground: "The children played on the playground.",
    butterfly:  "A butterfly landed on the flower.",
    waterfall:  "We heard the waterfall before we saw it.",
    rainbow:    "A rainbow appeared after the rain.",
  };

  const letters = ['A','B','C'];

  // ─── Act 1 ───
  const act1 = `<div class="act-page">
    ${titleBlock}${nameBlock}
    <h2>Activity 1 — Cloze Sentences</h2>
    <p style="font-size:.87rem;color:#6b7280;margin-bottom:14px">Circle the correct word to complete each sentence.</p>
    <ul class="cloze-list">${clozePairs.map((p,i)=>`<li style="flex-direction:column;align-items:flex-start;gap:5px">
      <span><span class="cloze-num">${i+1}.</span> ${p.s.replace("___",`<span class="cloze-blank"></span><span class="ans">${p.w}</span>`)}</span>
      <div class="cloze-opts">${p.opts.map((o,j)=>`<span class="cloze-opt${j===p.ci?" correct":""}">${letters[j]}) ${o}</span>`).join("")}</div>
    </li>`).join("")}</ul>
  </div>`;

  // ─── Act 2 ───
  const act2 = `<div class="act-page">
    ${titleBlock}${nameBlock}
    <h2>Activity 2 — Unscramble the Letters</h2>
    <p style="font-size:.87rem;color:#6b7280;margin-bottom:14px">Rearrange the letters to spell a compound word from List 24.</p>
    <div class="scramble-grid">${scramblePairs.map((p,i)=>`<div class="sc-row">
      <span class="sc-num">${i+1}.</span>
      <span class="sc-word">${p.sc}</span>
      <span class="sc-ans"><span class="ans">${p.w}</span></span>
    </div>`).join("")}</div>
  </div>`;

  // ─── Act 3 ───
  const act3 = `<div class="act-page">
    ${titleBlock}${nameBlock}
    <h2>Activity 3 — Match the Halves</h2>
    <p style="font-size:.87rem;color:#6b7280;margin-bottom:10px">Add a second part from the box to make a compound word. Write the full word on the line.</p>
    ${bankOf(matchB)}
    <div class="match-grid">
      <div><div class="match-col-head">First Part</div>
        ${matchA.map((a,i)=>`<div class="match-row">
          <span class="match-num">${i+1}.</span>
          <span style="font-weight:700">${a}–</span>
          <span class="match-ans"><span class="ans">${matchAnswers[i]}</span></span>
        </div>`).join("")}
      </div>
      <div style="padding-left:8px"><div class="match-col-head">&nbsp;</div>
        <p style="font-size:.82rem;color:#6b7280;font-style:italic;margin-top:12px">Tip: Each second part is used once.</p>
      </div>
    </div>
  </div>`;

  // ─── Act 4 ───
  const act4 = `<div class="act-page">
    ${titleBlock}${nameBlock}
    <h2>Activity 4 — Word Sort</h2>
    <p style="font-size:.87rem;color:#6b7280;margin-bottom:10px">Sort each word into the correct group.</p>
    ${bankOf(sortWords)}
    <div class="sort-grid">${sortGroups.map(g=>{
      const ans = sortAnswerMap[g]||[];
      return `<div class="sort-col">
        <div class="sort-head">${g}</div>
        <div class="sort-body">
          <div class="sort-lines">${ans.map(()=>`<div class="sort-line"></div>`).join("")}</div>
          <div class="ans-words">${ans.map(w=>`<div class="ans-word">${w}</div>`).join("")}</div>
        </div>
      </div>`;
    }).join("")}</div>
  </div>`;

  // ─── Act 5 ───
  const act5 = `<div class="act-page">
    ${titleBlock}${nameBlock}
    <h2>Activity 5 — Build a Sentence</h2>
    <p style="font-size:.87rem;color:#6b7280;margin-bottom:16px">Write one sentence using each compound word.</p>
    <div class="sent-grid">${sentWords.map(w=>`<div class="sent-item">
      <div class="sent-word">${w}<span class="ans" style="font-weight:400;font-size:.82rem;margin-left:10px;font-style:italic">${sentExamples[w]}</span></div>
      <div class="sent-line"></div>
    </div>`).join("")}
    </div>
  </div>`;

  document.getElementById("act-content").innerHTML = act1+act2+act3+act4+act5;
}

buildMain();
</script>
