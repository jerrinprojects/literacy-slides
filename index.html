<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spelling Lists 23–33</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Segoe UI',Arial,sans-serif;}
body{background:#f4f0fc;}

/* ── MAIN PAGE ── */
#main{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:52px 24px 80px;}
#main h1{font-size:3rem;color:#3b0764;margin-bottom:8px;text-align:center;font-weight:800;}
#main .sub{font-size:1.2rem;color:#7c3aed;margin-bottom:48px;}
.grid{display:flex;flex-wrap:wrap;gap:22px;justify-content:center;max-width:960px;}
.card{background:#fff;border-radius:22px;padding:32px 26px;width:210px;text-align:center;cursor:pointer;
  box-shadow:0 6px 26px rgba(100,50,200,.12);transition:transform .18s,box-shadow .18s;border:3px solid transparent;}
.card:hover{transform:translateY(-8px);box-shadow:0 16px 40px rgba(100,50,200,.22);border-color:var(--c);}
.card .badge{display:inline-block;color:#fff;font-size:.82rem;font-weight:700;padding:5px 16px;
  border-radius:20px;background:var(--c);margin-bottom:14px;letter-spacing:.05em;}
.card h2{font-size:1.05rem;color:#1e1e2e;line-height:1.45;margin-bottom:6px;font-weight:700;}
.card p{font-size:.85rem;color:#888;line-height:1.4;}
.card .arr{font-size:1.6rem;margin-top:12px;display:block;transition:transform .18s;color:var(--c);}
.card:hover .arr{transform:translateX(6px);}

/* ── SLIDE VIEW ── */
#sv{display:none;position:fixed;inset:0;background:#fff;flex-direction:column;}

/* top bar */
.topbar{display:flex;align-items:center;padding:12px 18px;gap:12px;
  border-bottom:2px solid #e5e7eb;background:#fff;flex-shrink:0;z-index:20;}
.btn-back{background:#f3f4f6;color:#374151;border:none;border-radius:10px;
  padding:8px 18px;font-size:.95rem;cursor:pointer;font-weight:600;transition:background .15s;}
.btn-back:hover{background:#e5e7eb;}

/* sidebar toggle button */
.btn-sidebar{background:#f3f4f6;color:#374151;border:none;border-radius:10px;
  padding:8px 14px;font-size:1.1rem;cursor:pointer;font-weight:700;transition:background .15s;flex-shrink:0;}
.btn-sidebar:hover{background:#e5e7eb;}

.topbar-title{flex:1;text-align:center;color:#374151;font-size:.95rem;font-weight:700;letter-spacing:.02em;}
.topbar-count{color:#9ca3af;font-size:.88rem;min-width:60px;text-align:right;font-weight:600;flex-shrink:0;}

/* ── BODY = sidebar + stage ── */
.sv-body{flex:1;display:flex;overflow:hidden;}

/* ── SIDEBAR ── */
#sidebar{
  width:260px;min-width:260px;background:#f9fafb;border-right:2px solid #e5e7eb;
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .25s ease,min-width .25s ease;
  flex-shrink:0;
}
#sidebar.collapsed{width:0;min-width:0;border-right:none;}

.sidebar-inner{width:260px;display:flex;flex-direction:column;height:100%;overflow:hidden;}

.sidebar-header{padding:14px 16px;border-bottom:1px solid #e5e7eb;flex-shrink:0;}
.sidebar-header span{font-size:.78rem;font-weight:700;color:#9ca3af;letter-spacing:.08em;text-transform:uppercase;}

.sidebar-list{flex:1;overflow-y:auto;padding:8px 0;}
.sidebar-list::-webkit-scrollbar{width:4px;}
.sidebar-list::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px;}

.sb-item{
  display:flex;align-items:center;gap:10px;padding:9px 14px;
  cursor:pointer;border-left:3px solid transparent;
  transition:background .15s,border-color .15s;
}
.sb-item:hover{background:#f0e9ff;}
.sb-item.active{border-left-color:var(--accent);background:#f5f0ff;}
.sb-item .sb-num{
  font-size:.72rem;font-weight:700;color:#9ca3af;
  min-width:26px;text-align:right;flex-shrink:0;
}
.sb-item.active .sb-num{color:var(--accent);}
.sb-item .sb-label{font-size:.88rem;color:#374151;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-item.active .sb-label{font-weight:700;color:#111827;}
.sb-item.sb-section-item{background:#f3f4f6;}
.sb-item.sb-section-item .sb-label{font-size:.78rem;font-weight:700;color:#6b7280;letter-spacing:.04em;text-transform:uppercase;}
.sb-item.sb-title-item .sb-label{font-weight:700;}

/* ── STAGE ── */
.stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:28px 36px;}

.slide-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;animation:pop .22s ease;}
@keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}

/* ── TITLE SLIDE ── */
.sl-title{background:#fff;width:100%;max-width:820px;text-align:center;}
.sl-title .list-num{font-size:1rem;font-weight:700;color:#fff;display:inline-block;
  padding:6px 22px;border-radius:30px;margin-bottom:24px;letter-spacing:.06em;}
.sl-title h2{font-size:clamp(2.2rem,5vw,3.8rem);font-weight:800;color:#111827;margin-bottom:20px;line-height:1.15;}
.sl-title .rule{font-size:clamp(1.1rem,2vw,1.5rem);color:#4b5563;line-height:1.65;max-width:640px;margin:0 auto;}

/* ── SECTION SLIDE ── */
.sl-section{background:#fff;width:100%;max-width:820px;text-align:center;}
.sl-section .sec-label{font-size:clamp(.9rem,1.6vw,1.1rem);font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:18px;}
.sl-section h3{font-size:clamp(2rem,4.5vw,3.5rem);font-weight:800;line-height:1.2;color:#111827;}
.sl-section .sec-sub{font-size:clamp(1rem,1.8vw,1.4rem);color:#6b7280;margin-top:16px;}

/* ── WORD SLIDE ── */
.sl-word{background:#fff;width:100%;max-width:960px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;}
.sl-word .list-tag{font-size:.9rem;font-weight:700;color:#fff;padding:5px 18px;
  border-radius:20px;margin-bottom:28px;letter-spacing:.05em;}
.sl-word .the-word{font-weight:800;line-height:1.05;color:#111827;}
.sl-word .hl{font-weight:900;}
.sl-word .sub-text{font-size:clamp(1.1rem,2.2vw,1.7rem);color:#6b7280;margin-top:22px;font-weight:500;}
.sl-word .parts{margin-top:16px;font-size:clamp(1rem,2vw,1.5rem);color:#9ca3af;font-weight:600;}
.sl-word .parts .p1,.sl-word .parts .p2{font-weight:700;}

/* ── NAV ── */
.nav{display:flex;align-items:center;justify-content:center;gap:20px;
  padding:14px 22px;border-top:2px solid #e5e7eb;background:#fff;flex-shrink:0;}
.btn-nav{background:#f3f4f6;color:#374151;border:2px solid #e5e7eb;border-radius:12px;
  padding:12px 36px;font-size:1.05rem;cursor:pointer;font-weight:700;
  transition:background .15s,border-color .15s;min-width:120px;}
.btn-nav:hover:not(:disabled){background:#e5e7eb;border-color:#d1d5db;}
.btn-nav:disabled{opacity:.3;cursor:default;}

@media(max-width:600px){
  #sidebar{width:220px;min-width:220px;}
  .sidebar-inner{width:220px;}
  .stage{padding:16px;}
  .btn-nav{padding:10px 20px;font-size:.9rem;min-width:90px;}
}
</style>
</head>
<body>

<!-- MAIN PAGE -->
<div id="main">
  <h1>Spelling Lists</h1>
  <p class="sub">Year 3 · Lists 23 – 33</p>
  <div class="grid" id="cards"></div>
</div>

<!-- SLIDE VIEW -->
<div id="sv">
  <div class="topbar">
    <button class="btn-sidebar" id="btn-sidebar" onclick="toggleSidebar()" title="Toggle slide list">☰</button>
    <button class="btn-back" onclick="closeSlides()">← Back</button>
    <div class="topbar-title" id="sv-title"></div>
    <div class="topbar-count" id="sv-count"></div>
  </div>

  <div class="sv-body">
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-header"><span>All Slides</span></div>
        <div class="sidebar-list" id="sidebar-list"></div>
      </div>
    </div>

    <!-- STAGE -->
    <div class="stage" id="stage"></div>
  </div>

  <div class="nav">
    <button class="btn-nav" id="bprev" onclick="go(-1)">Prev</button>
    <button class="btn-nav" id="bnext" onclick="go(1)">Next</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════════════
const LISTS = [

  slides:[

  accent:"#b45309", hlColor:"#78350f", hl:null,
  hlFn: w=>{if(/er/.test(w)) return "er"; if(/ir/.test(w)) return "ir"; if(/ur/.test(w)) return "ur"; return null;},
  slides:[

    "verse","merge","prefer","infer","expert","alert","concern","desert","insert",

    "bird","girl","shirt","first","birth","third","stir","firm","sir","swirl",
    "whirl","flirt","squirt","thirst","twirl","chirp","dirty","thirty","birthday","circuit",

  slides:[

    {w:"mitten",syl:"mit·ten"},{w:"butter",syl:"but·ter"},{w:"dinner",syl:"din·ner"},

    {w:"lesson",syl:"les·son"},{w:"common",syl:"com·mon"},{w:"tennis",syl:"ten·nis"},
    {w:"carrot",syl:"car·rot"},{w:"parrot",syl:"par·rot"},{w:"barrel",syl:"bar·rel"},

    {w:"happy",syl:"hap·py"},{w:"penny",syl:"pen·ny"},{w:"funny",syl:"fun·ny"},
    {w:"sunny",syl:"sun·ny"},{w:"bunny",syl:"bun·ny"},{w:"puppy",syl:"pup·py"},
    {w:"silly",syl:"sil·ly"},{w:"jelly",syl:"jel·ly"},{w:"holly",syl:"hol·ly"},
    {s:"-le ending words"},
    {w:"little",syl:"lit·tle"},{w:"middle",syl:"mid·dle"},{w:"riddle",syl:"rid·dle"},

// ══════════════════════════════════════════════════════
//  MAIN PAGE
// ══════════════════════════════════════════════════════
function countWords(L){ return L.slides.filter(s=>typeof s==="string"||s.w).length; }

function buildMain(){
  const g = document.getElementById("cards");
  LISTS.forEach((L,i)=>{
    const d = document.createElement("div");
    d.className="card"; d.style.setProperty("--c",L.accent);
    d.innerHTML=`<div class="badge">List ${L.num}</div>
      <h2>${L.title}</h2>
      <p style="color:${L.accent};font-weight:700;font-size:.9rem;margin-top:4px;">${countWords(L)} words</p>
      <span class="arr">→</span>`;
    d.onclick=()=>openList(i);
    g.appendChild(d);
  });
}

// ══════════════════════════════════════════════════════
//  SLIDE BUILD
// ══════════════════════════════════════════════════════
let curList=null, curIdx=0, slides=[], sidebarOpen=true;

function buildSlides(L){
  const {accent:acc, hlColor, hl, hlFn} = L;

  function getHl(word){ return hlFn ? hlFn(word) : (hl||null); }
  function applyHl(text,pattern){
    if(!pattern) return text;
    const re=new RegExp(pattern.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g");
    return text.replace(re,`<span class="hl" style="color:${hlColor}">${pattern}</span>`);
  }
  function fs(word){
    const n=word.replace(/[·]/g,"").length;
    if(n<=3)  return "clamp(5rem,17vw,10rem)";
    if(n<=5)  return "clamp(4rem,13vw,8.5rem)";
    if(n<=7)  return "clamp(3.2rem,10vw,7rem)";
    if(n<=9)  return "clamp(2.8rem,8.5vw,5.5rem)";
    if(n<=12) return "clamp(2.2rem,6.5vw,4.5rem)";
    return              "clamp(1.8rem,5vw,3.5rem)";
  }

  const out=[];

  // title slide
  out.push({
    type:"title", label:"Intro",
    html:`<div class="slide-wrap"><div class="sl-title">
      <div class="list-num" style="background:${acc}">List ${L.num}</div>
      <h2>${L.title}</h2>
      <p class="rule">${L.rule.replace(/\n/g,"<br>")}</p>
    </div></div>`
  });

  L.slides.forEach(item=>{
    if(typeof item==="string"){
      const pattern=getHl(item), display=applyHl(item,pattern);
      out.push({type:"word", label:item, html:`<div class="slide-wrap"><div class="sl-word">
        <div class="list-tag" style="background:${acc}">List ${L.num} · ${L.title}</div>
        <p class="the-word" style="font-size:${fs(item)}">${display}</p>
      </div></div>`});
    } else if(item.s){
      out.push({type:"section", label:item.s, html:`<div class="slide-wrap"><div class="sl-section">
        <div class="sec-label" style="color:${acc}">List ${L.num} · ${L.title}</div>
        <h3 style="color:${acc}">${item.s}</h3>
      </div></div>`});
    } else if(item.w){
      const word=item.w, display_raw=item.syl||word;
      const pattern=getHl(word), display=applyHl(display_raw,pattern);
      const subHtml=item.sub
        ?`<div class="sub-text">${item.sub}</div>`
        :item.syl
        ?`<div class="sub-text" style="color:${acc};font-weight:600;">syllable split</div>`
        :"";
      const partsHtml=item.p
        ?`<div class="parts"><span class="p1" style="color:${acc}">${item.p[0]}</span> + <span class="p2" style="color:${hlColor}">${item.p[1]}</span></div>`
        :"";
      out.push({type:"word", label:word, html:`<div class="slide-wrap"><div class="sl-word">
        <div class="list-tag" style="background:${acc}">List ${L.num} · ${L.title}</div>
        <p class="the-word" style="font-size:${fs(word)}">${display}</p>
        ${subHtml}${partsHtml}
      </div></div>`});
    }
  });

  return out;
}

// ══════════════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════════════
function buildSidebar(){
  const list=document.getElementById("sidebar-list");
  list.innerHTML="";
  slides.forEach((s,i)=>{
    const div=document.createElement("div");
    let cls="sb-item";
    if(s.type==="title")   cls+=" sb-title-item";
    if(s.type==="section") cls+=" sb-section-item";
    if(i===curIdx)         cls+=" active";
    div.className=cls;
    div.style.setProperty("--accent",curList.accent);
    div.innerHTML=`<span class="sb-num">${i+1}</span><span class="sb-label">${s.label}</span>`;
    div.onclick=()=>goTo(i);
    list.appendChild(div);
  });
}

function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  document.getElementById("sidebar").classList.toggle("collapsed",!sidebarOpen);
  document.getElementById("btn-sidebar").textContent = sidebarOpen ? "☰" : "☰";
}

function syncSidebar(){
  document.querySelectorAll(".sb-item").forEach((el,i)=>{
    el.classList.toggle("active",i===curIdx);
  });
  // scroll active item into view
  const active=document.querySelector(".sb-item.active");
  if(active) active.scrollIntoView({block:"nearest",behavior:"smooth"});
}

// ══════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════
function openList(idx){
  curList=LISTS[idx]; curIdx=0;
  slides=buildSlides(curList);
  document.getElementById("sv-title").textContent=`List ${curList.num} · ${curList.title}`;
  buildSidebar();
  render();
  document.getElementById("main").style.display="none";
  document.getElementById("sv").style.display="flex";
  // ensure sidebar is open by default
  sidebarOpen=true;
  document.getElementById("sidebar").classList.remove("collapsed");
}

function render(){
  document.getElementById("stage").innerHTML=slides[curIdx].html;
  document.getElementById("sv-count").textContent=`${curIdx+1} / ${slides.length}`;
  document.getElementById("bprev").disabled=curIdx===0;
  document.getElementById("bnext").disabled=curIdx===slides.length-1;
  const nb=document.querySelectorAll(".btn-nav:not(:disabled)");
  nb.forEach(b=>{b.style.borderColor=curList.accent;b.style.color=curList.accent;});
  syncSidebar();
}

function go(dir){
  const n=curIdx+dir;
  if(n<0||n>=slides.length) return;
  curIdx=n; render();
}
function goTo(i){ curIdx=i; render(); }

function closeSlides(){
  document.getElementById("sv").style.display="none";
  document.getElementById("main").style.display="flex";
}

document.addEventListener("keydown",e=>{
  if(document.getElementById("sv").style.display==="flex"){
    if(e.key==="ArrowRight"||e.key==="ArrowDown") go(1);
    if(e.key==="ArrowLeft" ||e.key==="ArrowUp")   go(-1);
    if(e.key==="Escape") closeSlides();
  }
});

buildMain();
</script>
